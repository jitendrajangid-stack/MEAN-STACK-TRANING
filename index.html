<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEAN Stack Training Plan</title>
<style>
  :root{

  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:Roboto,Arial,Helvetica,sans-serif;font-size:14px;line-height:1.45}
  a{color:#1a73e8;text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1280px;margin:0 auto;padding:20px 16px 60px}

  header.top{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:16px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:40px;height:40px;border-radius:9px;background:var(--accent);color:#fff;font-weight:700;font-size:22px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .brand h1{font-size:20px;font-weight:600;letter-spacing:-.2px}
  .brand p{font-size:12px;color:var(--muted)}

  .whobar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:16px}
  .whobar label{font-weight:600;color:var(--muted);font-size:13px}
  .whobar input{font:inherit;padding:8px 12px;border:1px solid var(--line);border-radius:8px;min-width:220px;outline:none}
  .whobar input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(24,128,56,.15)}
  .progress{margin-left:auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .save{font-size:12px;color:var(--muted);min-width:70px}
  .save.ok{color:var(--dn-fg)} .save.err{color:#c5221f}
  .meter{display:flex;gap:6px;font-size:12px}
  .meter b{font-weight:600}
  .pill{padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600}
  .pill.d{background:var(--dn-bg);color:var(--dn-fg)}
  .pill.i{background:var(--ip-bg);color:var(--ip-fg)}
  .pill.t{background:var(--ns-bg);color:var(--ns-fg)}

  .hint{background:#fff8e1;border:1px solid #f6e2a8;color:#8a6d00;padding:8px 12px;border-radius:8px;font-size:12.5px;margin-bottom:14px}
  .hint.hide{display:none}

  nav.tabs{display:flex;flex-wrap:wrap;gap:2px;border-bottom:2px solid var(--line);margin-bottom:0}
  nav.tabs button{font:inherit;font-size:13px;padding:10px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:8px 8px 0 0}
  nav.tabs button.active{color:var(--accent);font-weight:700;box-shadow:inset 0 -3px 0 var(--accent);background:#fff}

  .panel{background:var(--card);border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;overflow:auto}
  table{border-collapse:collapse;width:100%;min-width:820px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  thead th{position:sticky;top:0;background:#f8f9fa;font-size:12px;color:var(--muted);font-weight:600;z-index:1;white-space:nowrap}
  tr.week td{background:#eef6f0;font-weight:700;color:#0f5f2b;font-size:13px}
  tr.week td .sub{font-weight:400;color:#4b7a5c;margin-left:8px}
  td.day{white-space:nowrap;font-weight:600}
  td.date{white-space:nowrap;color:var(--muted);font-size:12.5px}
  td.topic{font-weight:600;min-width:150px}
  td.sub{color:#3c4043;font-size:13px}
  .learn{white-space:nowrap}
  .status-cell{white-space:nowrap;width:1%}
  button.chip{border:none;padding:5px 13px;border-radius:999px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}

  button.chip.i{background:var(--ip-bg);color:var(--ip-fg)}
  button.chip.d{background:var(--dn-bg);color:var(--dn-fg)}
  button.chip:disabled{opacity:.55;cursor:not-allowed}
  .foot{margin-top:18px;font-size:12px;color:var(--muted);text-align:center}

</head>

/* --------------------------- DATE HELPER --------------------------------- */
function buildDates(startStr, count){
  count = count || 35;
  var p = (startStr||'2026-07-20').split('-').map(Number);
  var cur = new Date(p[0], (p[1]||1)-1, p[2]||1);
  var wd=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var out=[], guard=0;
  while(out.length<count && guard<400){
    var d=cur.getDay();
    if(d!==0 && d!==6) out.push(wd[d]+' · '+mo[cur.getMonth()]+' '+cur.getDate());
    cur.setDate(cur.getDate()+1); guard++;
  }
  return out;
}

    for(var i=0;i<5;i++){
      var idx=w*5+i, c=CURRICULUM[idx], dn=idx+1;
      h+='<tr><td class="day">Day '+dn+'</td><td class="date">'+esc(DATES[idx])+'</td><td class="topic">'+esc(c.topic)+'</td><td class="sub">'+esc(c.sub)+'</td><td class="learn">'+learnCell(c.gt,c.gu)+'</td><td class="learn">'+learnCell(c.bt,c.bu)+'</td><td>'+esc(c.ex)+'</td><td class="status-cell">'+chip(String(dn))+'</td></tr>';
    }
  }
  return h+'</tbody></table>';
}

function renderProject(){
  var h='<table><thead><tr><th>Day</th><th>Date</th><th>Project build task</th><th>Deliverable</th><th>Status</th></tr></thead><tbody>';
  for(var w=0;w<6;w++){
    h+='<tr class="week"><td colspan="5">'+esc(PROJECT_PHASES[w])+'</td></tr>';
    for(var i=0;i<5;i++){
      var idx=w*5+i, c=PROJECT[idx];
      h+='<tr><td class="day">Day '+(idx+1)+'</td><td class="date">'+esc(DATES[idx])+'</td><td>'+esc(c.task)+'</td><td class="topic">'+esc(c.out)+'</td><td class="status-cell">'+chip('P'+(idx+1))+'</td></tr>';
    }
  }
  return h+'</tbody></table>';
}

function renderFinal(){
  var h='<table><thead><tr><th colspan="6" style="background:#eef6f0;color:#0f5f2b;font-size:13px">Final Project (5-day): RecipeVault — a MEAN recipe manager</th></tr><tr><th>Day</th><th>Date</th><th>Focus</th><th>What to build</th><th>Output</th><th>Status</th></tr></thead><tbody>';
  for(var i=0;i<FINAL_DAYS.length;i++){
    var d=FINAL_DAYS[i];
    h+='<tr><td class="day">Day '+(i+1)+'</td><td class="date">'+esc(FINAL_DATES[i])+'</td><td class="topic">'+esc(d.focus)+'</td><td class="sub">'+esc(d.build)+'</td><td>'+esc(d.out)+'</td><td class="status-cell">'+chip('F'+(i+1))+'</td></tr>';
  }
  return h+'</tbody></table>';
}

function renderResources(){
  var h='<table><thead><tr><th>Topic</th><th>Good (start here)</th><th>Better / deeper</th></tr></thead><tbody>';
  for(var g=0;g<RES.length;g++){
    h+='<tr class="week"><td colspan="3">'+esc(RES[g].cat)+'</td></tr>';
    for(var i=0;i<RES[g].items.length;i++){
      var it=RES[g].items[i];
      h+='<tr><td class="topic">'+esc(it.topic)+'</td><td class="learn">'+learnCell(it.gt,it.gu)+'</td><td class="learn">'+learnCell(it.bt,it.bu)+'</td></tr>';
    }
  }
  return h+'</tbody></table>';
}

function render(){
  var v=document.getElementById('view');
  if(state.tab==='plan') v.innerHTML=renderPlan();
  else if(state.tab==='project') v.innerHTML=renderProject();
  else if(state.tab==='final') v.innerHTML=renderFinal();
  else v.innerHTML=renderResources();
  updateMeter();
}

function updateMeter(){
  var total=30+30+5, done=0, ip=0;
  for(var k in state.statuses){ if(state.statuses[k]==='Done') done++; else if(state.statuses[k]==='In progress') ip++; }
  document.getElementById('meter').innerHTML =
    '<span class="pill d">'+done+' done</span>'+
    '<span class="pill i">'+ip+' in progress</span>'+
    '<span class="pill t">'+(total-done-ip)+' left</span>';
  document.getElementById('hint').className = state.name ? 'hint hide' : 'hint';
}

/* ----------------------------- SAVE / LOAD ------------------------------- */
function setSave(txt,cls){ var el=document.getElementById('save'); el.textContent=txt||''; el.className='save '+(cls||''); }

function loadTrainee(name){
  state.name=name; state.statuses={};
  // local cache first (instant)
  try{ var c=localStorage.getItem(lsKey(name)); if(c) state.statuses=JSON.parse(c)||{}; }catch(e){}
  render();
  if(!API_URL || !name) return;
  setSave('Loading…');
  fetch(API_URL+'?name='+encodeURIComponent(name),{method:'GET'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d && d.statuses){ state.statuses=d.statuses; try{localStorage.setItem(lsKey(name),JSON.stringify(d.statuses));}catch(e){} render(); }
      setSave('Saved','ok');
    })
    .catch(function(){ setSave('Offline — saved locally','err'); });
}

function persist(){
  if(!state.name) return;
  try{ localStorage.setItem(lsKey(state.name),JSON.stringify(state.statuses)); }catch(e){}
  if(!API_URL) return;
  setSave('Saving…');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({name:state.name,statuses:state.statuses})})
      .then(function(r){return r.json();})
      .then(function(){ setSave('Saved','ok'); })
      .catch(function(){ setSave('Offline — saved locally','err'); });
  },600);
}

/* ----------------------------- EVENTS ------------------------------------ */
document.getElementById('view').addEventListener('click',function(e){
  var b=e.target.closest('button.chip'); if(!b||b.disabled) return;
  var key=b.getAttribute('data-key');
  var cur=state.statuses[key]||'Not started';
  var next=STATUS_ORDER[(STATUS_ORDER.indexOf(cur)+1)%3];
  state.statuses[key]=next;
  b.className='chip '+CHIP_CLASS[next]; b.textContent=next;
  updateMeter(); persist();
});

document.getElementById('tabs').addEventListener('click',function(e){
  var b=e.target.closest('button[data-tab]'); if(!b) return;
  state.tab=b.getAttribute('data-tab');
  [].forEach.call(this.querySelectorAll('button'),function(x){x.classList.toggle('active',x===b);});
  render();
});

var input=document.getElementById('trainee');
function applyName(name){
  name=(name||'').trim();
  input.value=name;
  var url=new URL(location.href);
  if(name) url.searchParams.set('name',name); else url.searchParams.delete('name');
  history.replaceState(null,'',url);
  loadTrainee(name);
}
input.addEventListener('change',function(){ applyName(input.value); });
input.addEventListener('keydown',function(e){ if(e.key==='Enter') applyName(input.value); });

/* ----------------------------- INIT -------------------------------------- */
(function init(){
  var qs=new URLSearchParams(location.search);
  var name=(qs.get('name')||'').trim();
  input.value=name;
  render();
  if(name) loadTrainee(name); else updateMeter();
})();
</script>
</body>
</html>
